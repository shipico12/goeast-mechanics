<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Go East Mechanics</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Official Supabase JavaScript Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header class="navbar">
    <div class="logo">GO EAST <span>MECHANICS</span></div>

    <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="inventory.html">Inventory</a>
        <a href="gallery.html">Gallery</a>
        <a href="testimonials.html">Testimonials</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Contact</a>
    </nav>

    <button class="menu-btn" id="menuBtn">☰</button>
</header>

<section class="hero page-hero">
    <div class="hero-content">
        <p class="tagline">Get In Touch</p>
        <h1>Book Your Service</h1>
        <p class="hero-text">
            Fill out the form below and we'll get back to you as soon as possible.
        </p>
    </div>
</section>

<section class="section">

    <div class="section-title">
        <p>Contact Us</p>
        <h2>Service Request Form</h2>
    </div>

    <form id="contactForm" class="contact-form">

        <input
            type="text"
            id="name"
            placeholder="Full Name"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email Address"
            required
        >

        <input
            type="tel"
            id="phone"
            placeholder="Phone Number"
        >

        <input
            type="text"
            id="vehicle"
            placeholder="Vehicle Make & Model"
        >

        <textarea
            id="message"
            placeholder="Describe the work your vehicle needs..."
            required
        ></textarea>

        <button
            class="btn primary-btn"
            type="submit">
            Submit Request
        </button>

    </form>

</section>

<footer>
    <p>© 2026 Go East Mechanics. All Rights Reserved.</p>
</footer>

<script src="js/script.js"></script>
<script src="js/contact.js"></script>

</body>
</html>
